<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <linf rel="" stylesheet" href="signup.css" type="text/css"></linf>
    <title>Sign-up Form</title>
</head>

<body>
    <div id="left">
        <div id="imageBackground">            
            <img href="image.png"></img>
        </div>
        <div id="logo">
            <img id="logoImage" href="logo.png"></img>
            <div id="odinNameDiv">ODIN</div>
        </div>
    </div>
    <div id="mainForm">
        <div id="description">
            <p id="descrPara1" class="description">This is not a real online service! You know you need something like
                this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
            <p id="descrPara2" class="description">You know you want to.</p>
        </div>
        <form id="theForm">
            <p id="formTitle">Let's do this!</p>
            <div id="formCol1" class="formColumn">
                <label for="name_first">First Name</label>    
                <input id="name_first" name="name_first"></input>    
                <label for="email">eMail</label>    
                <input type="email" id="email" name="email"></input>    
                <label for="password">Password</label>    
                <input type="password" id="password" name="password"></input>    
            </div>
            <div id="formCol2" class="formColumn">
                <label for="name_last">Last Name</label>    
                <input id="name_last" name="name_last"></input>    
                <label for="phone">Phone Number</label>    
                <!-- TODO: Use a pattern vaidator!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! -->
                <input id="phone" name="phone"></input>    
                <label for="passwordConfirm">Confirm Password</label>    
                <input type="password" id="passwordConfirm" name="passwordConfirm"></input>                    
            </div>            
            <div id="divFormFooter" class="divFormFooter">
                <button id="btnSubmit" type="submit">Create Account</button>                
                <p id="formFooter" class="formFooter">Already have a login? <a href=whatever">Log In</a></p>
            </div>
        </form>
    
    </div>




</body>

</html>
